updates:
  add_tags: 'Mail-Photopolicy'
query:
  include_sepa_mail_in_mailing_to: false
  where:
    #id: 2
    id: [30, 521, 1164, 1741, 685, 684, 1734, 320, 2175, 244, 399, 998, 328, 1767, 2220, 2343, 572, 1979] 
from_addr: anmeldung@worldscoutjamboree.de
email_from: info@worldscoutjamboree.de
email_subject: "Einwilligung zur Nutzung von Fotos & Videos - {{ row.short_full_name }} (id {{ row.id }})"
summary: "{{ row.id }} {{ row.short_full_name }}; role: {{ row.payment_role }}; To: {{ msg.to }}; Cc: {{ msg.cc }}"
signature: "{{ EMAIL_SIGNATURE_CMT }}"
content: |
  Gut Pfad {{ row.greeting_name }},

  das Jamboree wirft seine Schatten voraus. Die ersten Treffen rücken näher und die Vorfreude steigt! Ein so großes Ereignis verdient natürlich auch eine tolle Erinnerung, die wir in Bildern und Videos festhalten möchten. 

  Da für die mit dieser Mail angeschriebenen Teilnehmenden derzeit keine Zustimmung zur Nutzung von Foto- und Videoaufnahmen vorliegt, möchten wir einige wichtige Hinweise zum Umgang damit im Rahmen der Vorbereitungstreffen und der Veranstaltung geben:

  • Im deutschen Kontingent achten wir darauf, dass das Fotoverbot eingehalten wird. Wir können aber nicht garantieren, dass Fotografierende aus anderen Kontingenten, oder Fotografierende des Veranstalters ebenfalls darauf achten. Auf dem Jamboree selbst gelten andere Foto-Regeln, da es sich um eine öffentliche Veranstaltung handelt. Wie bei vergangenen Jamborees gehen wir davon aus, dass der Veranstalter keine Rücksicht auf Ihren Widerspruch zur Fotogenehmigung nehmen wird.

  • Liegt keine Fotogenehmigung vor, ist bei allen Aktivitäten – von Vorbereitungstreffen bis zur Veranstaltung selbst – eine deutlich sichtbare Kennzeichnung des jeweiligen Teilnehmenden erforderlich, die auf das Fotoverbot hinweist. Dies dient der besseren Umsetzung des Wunsches, nicht fotografiert zu werden. Gleichzeitig kann eine solche Kennzeichnung im Alltag der Veranstaltung für den Einzelnen als unangenehm empfunden werden. Wenn diese Kennzeichnung nicht getragen wird, gilt dies im Umkehrschluss als eine - für den Einzelfall - erteilte Erlaubnis.

  • Die fehlende Zustimmung zur Fotogenehmigung gilt ebenfalls für Gruppenfotos und Gruppenaufnahmen.

  • In der Nachberichterstattung, etwa im offiziellen Film oder dem Erinnerungsbuch, werden Personen ohne Fotogenehmigung nicht vorkommen. Das wäre schade, weil so ein Stück der gemeinschaftlichen Erinnerung fehlt.

  Wir möchten daher darum bitten, die genannten Punkte sorgfältig abzuwägen und ggf. gemeinsam innerhalb der Familie zu besprechen. Sollte eine Änderung der bisherigen Entscheidung gewünscht sein, ist dies jederzeit per E-Mail möglich.

  Für Rückfragen, Bedenken oder ein persönliches Gespräch stehen wir gerne zur Verfügung.

  Herzlich Gut Pfad

  Caro, Fox & Ines (HOC, Heads of Contingent)