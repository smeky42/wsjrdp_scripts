from_addr: anmeldung@worldscoutjamboree.de
email_from: ist@worldscoutjamboree.de
email_subject: "Deine IST Regionalgruppe für das World Scout Jamboree 2027 in Polen! - {{ row.short_full_name }} (id {{ row.id }})"
summary: "{{ row.id }} {{ row.short_full_name }}; role: {{ row.payment_role }}; To: {{ msg.to }}; Cc: {{ msg.cc }}"
signature: "{{ EMAIL_SIGNATURE_CMT }}"
content: |
  Hallo {{ row.greeting_name }},

  wir freuen uns, dir mitteilen zu können, dass du in deine geplante Regionalgruppe "Nord Ost" verschoben wurdest. 

  Du kannst dich unter https://anmeldung.worldscoutjamboree.de/ mit deinen Zugangsdaten anmelden und deine Gruppe 
  überprüfen.

  Falls du Fragen oder Änderngswünsche hast, melde dich gerne bei Micha oder antworte auf diese E-Mail.

  Gut Pfad, dein IST-Support-Team

  Micha